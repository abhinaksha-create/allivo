{% extends "base.html" %}

{% block content %}
<div class="container form-container">
    <h2>Add Product</h2>

    <form method="POST" enctype="multipart/form-data">
        <input type="text" name="name" placeholder="Product Name" required>
        <input type="text" name="subcategory" placeholder="Subcategory">
        <input type="text" name="brand" placeholder="Brand">
        <input type="number" step="0.01" name="price" placeholder="Price" required>
        <input type="number" step="0.01" name="discount" placeholder="Discount">
        <input type="number" name="stock" placeholder="Stock" required>

        <!-- Optional: keep a separate path field with a different name -->
        <input type="text" name="image_path" placeholder="Image path like products/rice.jpg">

        <!-- Actual file upload field (name MUST match request.files['image']) -->
        <input type="file" name="image" accept="image/*" required>

        <textarea name="description" placeholder="Description"></textarea>

        <select name="category_id" required>
            <option value="">Select Category</option>
            {% if categories is defined and categories %}
                {% for category in categories %}
                    <option value="{{ category[0] }}">{{ category[1] }}</option>
                {% endfor %}
            {% endif %}
        </select>

        <select name="delivery_type" required>
            <option value="">Select Delivery Type</option>
            <option value="instant">Instant</option>
            <option value="scheduled">Scheduled</option>
        </select>

        <input type="number" step="0.1" name="rating" placeholder="Rating">
        <input type="number" name="refill_days" placeholder="Refill Days">

        <label>
            <input type="checkbox" name="is_student_pick" value="1"> Student Pick
        </label>

        <button type="submit" class="btn">Add Product</button>
    </form>
</div>
{% endblock %}
