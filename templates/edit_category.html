{% extends "base.html" %}

{% block content %}
<div class="container admin-products-page">

    <div class="admin-page-head" style="margin-top: 24px;">
        <div>
            <p class="admin-overline" style="color:#6b7280;">Admin Control</p>
            <h1 class="section-title" style="margin-top:0;">Edit Category</h1>
            <p class="admin-subtext" style="color:#6b7280;">
                Update category details to keep product organization accurate and clear.
            </p>
        </div>
    </div>

    <div class="form-container" style="max-width: 700px;">
        <h2>Edit Category</h2>

        <form method="POST">
            <label>Category Name</label>
            <input type="text" name="name" value="{{ category[1] }}" required>

            <label>Description</label>
            <textarea name="description" rows="4">{{ category[2] if category[2] else '' }}</textarea>

            <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:10px;">
                <button type="submit" class="btn">Save Changes</button>
                <a href="{{ url_for('manage_categories') }}" class="btn btn-outline">Back</a>
            </div>
        </form>
    </div>

</div>
{% endblock %}
